appId: com.agent-harness.studio
productName: Harness Studio
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
asar: true
win:
  target:
    - nsis
  signingHashAlgorithms:
    - sha256
  sign: scripts/sign.cjs
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  releaseType: release
